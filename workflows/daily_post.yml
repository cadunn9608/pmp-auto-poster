name: Daily PMP Facebook Auto-Poster

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai requests

      - name: Generate Content and Post to Facebook
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          python -c "
          import os
          from google import genai
          import requests

          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          
          prompt = (
              'Generate 1 high-yield PMP exam practice question formatted specifically as an interactive daily poll. '
              'Include: '
              '1. The Scenario Question. '
              '2. Clear voting choices formatted as A, B, C, D. '
              '3. The Correct Answer revealed cleanly. '
              '4. A concise PMP mindset explanation. '
              '5. A call-to-action with your affiliate link. '
              'Keep the formatting visually engaging with clean line breaks for a Facebook feed.'
          )

          response = client.models.generate_content(
              model='gemini-2.0-flash',
              contents=prompt,
          )
          
          post_text = response.text

          page_id = os.environ['FACEBOOK_PAGE_ID']
          token = os.environ['FACEBOOK_ACCESS_TOKEN']
          url = f'https://graph.facebook.com/v18.0/{page_id}/feed'
          
          payload = {
              'message': post_text,
              'published': 'true',
              'access_token': token
          }
          
          res = requests.post(url, data=payload)
          print('Facebook Response:', res.json())
          "
