name: Debug Facebook Auto-Poster

on:
  workflow_dispatch:

jobs:
  debug-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Detailed API Diagnostic
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          python -c "
          import os
          import requests

          page_id = os.environ['FACEBOOK_PAGE_ID']
          token = os.environ['FACEBOOK_ACCESS_TOKEN']

          print('--- STEP 1: Testing Token Identity ---')
          me_url = f'https://graph.facebook.com/v18.0/me?access_token={token}'
          me_res = requests.get(me_url)
          print('Token Owner Response:', me_res.json())

          print('\n--- STEP 2: Verifying Page Permissions ---')
          perms_url = f'https://graph.facebook.com/v18.0/{page_id}?fields=name,access_token,tasks&access_token={token}'
          perms_res = requests.get(perms_url)
          print('Page Details Response:', perms_res.json())

          print('\n--- STEP 3: Attempting Test Post ---')
          url = f'https://graph.facebook.com/v18.0/{page_id}/feed'
          payload = {
              'message': '🛠️ DEBUG TEST: Checking feed visibility.',
              'published': 'true',
              'access_token': token
          }
          
          res = requests.post(url, data=payload)
          print('Post API Status Code:', res.status_code)
          print('Post API Full JSON Response:', res.json())
          "
