name: Daily PMP Facebook Auto-Poster

on:
  workflow_dispatch:

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Post Link-Out Quiz to Facebook
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          python -c "
          import os
          import requests

          # Placeholder quiz post text with a call-to-action link 
          # (Replace the URL with your hosted quiz page or Vercel app link)
          post_text = (
              '📊 DAILY PMP INTERACTIVE PRACTICE CHALLENGE\n\n'
              'Test your project management skills! Click below to open today\'s interactive quiz, '
              'select your answer box, and get instant feedback with full PMP mindset explanations.\n\n'
              '👉 Take the Quiz Here: https://your-quiz-site.vercel.app\n\n'
              '#PMP #ProjectManagement #PMPExam #StudyPMP'
          )

          page_id = os.environ['FACEBOOK_PAGE_ID']
          token = os.environ['FACEBOOK_ACCESS_TOKEN']
          url = f'https://graph.facebook.com/v18.0/{page_id}/feed'
          
          payload = {
              'message': post_text,
              'published': 'true',
              'access_token': token
          }
          
          res = requests.post(url, data=payload)
          print('Facebook Response:', res.json())
          "
