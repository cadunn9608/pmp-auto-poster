name: Daily PMP Facebook Auto-Poster

on:
  workflow_dispatch:

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Post Styled Quiz to Facebook
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          python -c "
          import os
          import requests

          # Stylized post formatting using Unicode characters for clear visibility
          post_text = (
              '📊 𝐃𝐀𝐈𝐋𝐘 𝐏𝐌𝐏 𝐏𝐑𝐀𝐂𝐓𝐈𝐂𝐄 𝐂𝐇𝐀𝐋𝐋𝐄𝐍𝐆𝐄\n\n'
              'A project manager discovers a major compliance issue mid-project. What should they do first?\n\n'
              '• 𝐀) Stop all work immediately\n'
              '• 𝐁) Analyze the impact and consult the risk register\n'
              '• 𝐂) Inform the sponsor right away\n'
              '• 𝐃) Ignore it if it doesn’t impact the budget\n\n'
              '━━━━━━━━━━━━━━━━━━\n\n'
              '💬 𝙒𝐚𝐧𝐭 𝐢𝐧𝐬𝐭𝐚𝐧𝐭 𝐟𝐞𝐞𝐝𝐛𝐚𝐜𝐤?\n'
              '👉 Click below to open a private chat and check your answer:\n'
              'https://m.me/your-facebook-page-username?ref=daily_quiz'
          )

          page_id = os.environ['FACEBOOK_PAGE_ID']
          token = os.environ['FACEBOOK_ACCESS_TOKEN']
          url = f'https://graph.facebook.com/v18.0/{page_id}/feed'
          
          payload = {
              'message': post_text,
              'published': 'true',
              'access_token': token
          }
          
          res = requests.post(url, data=payload)
          print('Facebook Response:', res.json())
          "
