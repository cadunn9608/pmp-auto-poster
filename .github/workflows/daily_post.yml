name: Daily PMP Facebook Auto-Poster

on:
  workflow_dispatch:

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Post Static Poll to Facebook
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          python -c "
          import os
          import requests

          post_text = (
              '📊 DAILY PMP PRACTICE POLL\n\n'
              'A project manager discovers a major compliance issue mid-project. What should they do first?\n\n'
              'A) Stop all work immediately\n'
              'B) Analyze the impact and consult the risk register\n'
              'C) Inform the sponsor right away\n'
              'D) Ignore it if it doesn’t impact the budget\n\n'
              'Correct Answer: B\n'
              'Mindset: Always analyze impact before taking impulsive action.'
          )

          page_id = os.environ['FACEBOOK_PAGE_ID']
          token = os.environ['FACEBOOK_ACCESS_TOKEN']
          url = f'https://graph.facebook.com/v18.0/{page_id}/feed'
          
          payload = {
              'message': post_text,
              'published': 'true',
              'access_token': token
          }
          
          res = requests.post(url, data=payload)
          print('Facebook Response:', res.json())
          "
